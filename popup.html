<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sakinah</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>سكينة</h1>
      <p class="subtitle">المنشاوي وعبد الباسط</p>
    </div>

    <div id="currentTrack" class="current-track">اضغط للتشغيل</div>
    <div id="currentReciter" class="current-reciter"></div>

    <div class="controls">
      <button id="playPauseBtn" class="play-btn" title="تشغيل / إيقاف">
        <svg id="playIcon" class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="pauseIcon" class="icon hidden" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>

      <button id="shuffleBtn" class="shuffle-btn" title="تشغيل عشوائي">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
        </svg>
      </button>
    </div>

    <div id="status" class="status">متوقف</div>

    <div class="volume-control">
      <svg class="volume-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>
      </svg>
      <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="80">
      <span id="volumeValue" class="volume-value">80%</span>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="popup.js"></script>
</body>
</html>
